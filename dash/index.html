<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>API Dashboard</title>

<style>
body {
  font-family: Arial, sans-serif;
  background:#f5f5f5;
  padding:30px;
}

.card {
  background:white;
  padding:20px;
  border-radius:10px;
  margin-bottom:20px;
  box-shadow:0 2px 8px #ccc;
}

table {
  width:100%;
  border-collapse:collapse;
  background:white;
}

th, td {
  padding:10px;
  border-bottom:1px solid #ddd;
  text-align:left;
}
</style>

</head>

<body>

<h1>Login Dashboard</h1>

<div class="card">
  <h2>System Status</h2>
  <p id="status">Loading...</p>
</div>


<div class="card">
<h2>Logs</h2>

<table>
<thead>
<tr>

<th>User</th>
<th>Password</th>
<th>IP</th>
</tr>
</thead>

<tbody id="logs">
</tbody>

</table>

</div>


<script>

async function loadDashboard(){

  try {

    const response = await fetch("/login/log");

    const rogu = await response.json();


    document.getElementById("status").textContent =
      "API Connected";


    const table = document.getElementById("logs");

    table.innerHTML = "";


    rogu.forEach(log => {

      const row = document.createElement("tr");

      row.innerHTML = `
        <td>${log.user}</td>
        <td>${log.password}</td>
        <td>${log.ip}</td>
      `;

      table.appendChild(row);

    });


  } catch(error){

    document.getElementById("status").textContent =
      "API Error";

    console.error(error);

  }

}


loadDashboard();

</script>


</body>
</html>
